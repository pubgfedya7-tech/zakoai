<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ZakoAI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700&display=swap');
:root{--bg:#0b0d12;--surface:#13151d;--border:#1e2130;--accent:#6c63ff;--accent2:#a78bfa;--text:#e8eaf2;--muted:#6b7280;--user-bg:#1a1d2e;--radius:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);}
.logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.25rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.status{display:flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--muted);}
.dot{width:7px;height:7px;border-radius:50%;background:#34d399;box-shadow:0 0 6px #34d399;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#chat{flex:1;overflow-y:auto;padding:28px 20px;display:flex;flex-direction:column;gap:20px;}
.message{display:flex;gap:12px;max-width:780px;animation:fadeUp .3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.message.user{align-self:flex-end;flex-direction:row-reverse;}
.message.ai{align-self:flex-start;}
.avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:600;}
.message.ai .avatar{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.message.user .avatar{background:var(--user-bg);border:1px solid var(--border);color:var(--muted);}
.bubble{padding:12px 16px;border-radius:var(--radius);font-size:.92rem;line-height:1.65;max-width:calc(100% - 50px);}
.message.ai .bubble{background:var(--surface);border:1px solid var(--border);border-top-left-radius:4px;}
.message.user .bubble{background:var(--user-bg);border:1px solid var(--border);border-top-right-radius:4px;}
.typing-dots{display:flex;gap:5px;padding:4px 2px;}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:bounce .9s infinite;}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;flex:1;text-align:center;padding:40px 20px;}
.welcome-icon{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:1.8rem;box-shadow:0 0 32px rgba(108,99,255,.35);}
#welcome h1{font-family:'Space Grotesk',sans-serif;font-size:1.7rem;background:linear-gradient(135deg,#fff,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
#welcome p{color:var(--muted);font-size:.9rem;max-width:340px;}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px;}
.suggestion{padding:8px 16px;background:var(--surface);border:1px solid var(--border);border-radius:999px;font-size:.82rem;color:var(--text);cursor:pointer;transition:all .2s;}
.suggestion:hover{border-color:var(--accent);color:var(--accent2);}
footer{padding:16px 20px 20px;background:var(--surface);border-top:1px solid var(--border);}
.input-row{display:flex;gap:10px;align-items:flex-end;max-width:820px;margin:0 auto;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px 10px 10px 16px;transition:border-color .2s;}
.input-row:focus-within{border-color:var(--accent);}
#userInput{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Inter',sans-serif;font-size:.92rem;resize:none;max-height:120px;line-height:1.5;}
#userInput::placeholder{color:var(--muted);}
#sendBtn{width:38px;height:38px;flex-shrink:0;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#sendBtn:disabled{opacity:.35;cursor:not-allowed;}
#sendBtn svg{width:17px;height:17px;}
</style>
</head>
<body>
<header>
<span class="logo">ZakoAI</span>
<div class="status"><div class="dot"></div>Faol</div>
</header>
<div id="chat">
<div id="welcome">
<div class="welcome-icon">✦</div>
<h1>Salom! Men ZakoAI</h1>
<p>Har qanday savolingizga javob beraman.</p>
<div class="suggestions">
<button class="suggestion">🚀 Kelajak texnologiyalari</button>
<button class="suggestion">📝 Menga she'r yoz</button>
<button class="suggestion">💡 Biznes g'oyasi ber</button>
<button class="suggestion">🧠 Matematik masala</button>
</div>
</div>
</div>
<footer>
<div class="input-row">
<textarea id="userInput" rows="1" placeholder="Xabar yozing…"></textarea>
<button id="sendBtn" disabled>
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
</button>
</div>
</footer>
<script>
const chat=document.getElementById('chat');
const input=document.getElementById('userInput');
const sendBtn=document.getElementById('sendBtn');
const HISTORY=[];
const K='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';
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,120)+'px';sendBtn.disabled=!input.value.trim();});
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
sendBtn.addEventListener('click',send);
document.querySelectorAll('.suggestion').forEach(b=>{b.addEventListener('click',()=>{input.value=b.textContent.slice(2).trim();input.dispatchEvent(new Event('input'));send();});});
function addMsg(role,content){
document.getElementById('welcome')?.remove();
const w=document.createElement('div');w.className='message '+role;
const a=document.createElement('div');a.className='avatar';a.textContent=role==='ai'?'✦':'👤';
const b=document.createElement('div');b.className='bubble';
if(content==='__t__')b.innerHTML='<div class="typing-dots"><span></span><span></span><span></span></div>';
else b.innerHTML=content.replace(/\n/g,'<br>');
w.appendChild(a);w.appendChild(b);chat.appendChild(w);chat.scrollTop=chat.scrollHeight;return b;
}
async function send(){
const t=input.value.trim();if(!t)return;
input.value='';input.style.height='auto';sendBtn.disabled=true;
addMsg('user',t);HISTORY.push({role:'user',content:t});
const tb=addMsg('ai','__t__');
try{
const r=await fetch('https://openrouter.ai/api/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+K,'HTTP-Referer':'https://pubgfedya7-tech.github.io/zakoai/','X-Title':'ZakoAI'},body:JSON.stringify({model:'meta-llama/llama-3.3-70b-instruct:free',messages:[{role:'system',content:"Sen ZakoAI — aqlli o'zbek AI yordamchisi. O'zbek tilida qisqa va aniq javob ber."},...HISTORY]})});
const d=await r.json();
const reply=d.choices?.[0]?.message?.content||'Javob kelmadi.';
HISTORY.push({role:'assistant',content:reply});
tb.innerHTML=reply.replace(/\n/g,'<br>');
}catch(e){tb.innerHTML='⚠️ Xatolik. Qayta urining.';}
chat.scrollTop=chat.scrollHeight;
}
</script>
</body>
</html>
