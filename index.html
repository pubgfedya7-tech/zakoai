<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZakoAI – Aqlli Suhbatdosh</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;600;700&display=swap');

    :root {
      --bg:       #0b0d12;
      --surface:  #13151d;
      --border:   #1e2130;
      --accent:   #6c63ff;
      --accent2:  #a78bfa;
      --text:     #e8eaf2;
      --muted:    #6b7280;
      --user-bg:  #1a1d2e;
      --ai-bg:    #13151d;
      --radius:   14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.25rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #34d399;
      box-shadow: 0 0 6px #34d399;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message {
      display: flex;
      gap: 12px;
      max-width: 780px;
      animation: fadeUp .3s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.ai   { align-self: flex-start; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .message.ai .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }
    .message.user .avatar {
      background: var(--user-bg);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 0.92rem;
      line-height: 1.65;
      max-width: calc(100% - 50px);
    }
    .message.ai .bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }
    .message.user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--border);
      border-top-right-radius: 4px;
      color: var(--text);
    }

    /* typing indicator */
    .typing-dots { display: flex; gap: 5px; padding: 4px 2px; }
    .typing-dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      animation: bounce .9s infinite;
    }
    .typing-dots span:nth-child(2){ animation-delay:.15s }
    .typing-dots span:nth-child(3){ animation-delay:.3s  }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

    /* ── Welcome ── */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex: 1;
      text-align: center;
      padding: 40px 20px;
    }
    .welcome-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      box-shadow: 0 0 32px rgba(108,99,255,.35);
    }
    #welcome h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.7rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #welcome p { color: var(--muted); font-size: 0.9rem; max-width: 340px; }

    .suggestions {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }
    .suggestion {
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.82rem;
      color: var(--text);
      cursor: pointer;
      transition: all .2s;
    }
    .suggestion:hover {
      border-color: var(--accent);
      color: var(--accent2);
      background: rgba(108,99,255,.08);
    }

    /* ── Input area ── */
    footer {
      padding: 16px 20px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 820px;
      margin: 0 auto;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 10px 10px 16px;
      transition: border-color .2s;
    }
    .input-row:focus-within { border-color: var(--accent); }

    #userInput {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }
    #userInput::placeholder { color: var(--muted); }

    #sendBtn {
      width: 38px; height: 38px;
      flex-shrink: 0;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .2s, transform .15s;
    }
    #sendBtn:hover:not(:disabled) { opacity: .85; transform: scale(1.05); }
    #sendBtn:disabled { opacity: .35; cursor: not-allowed; }
    #sendBtn svg { width: 17px; height: 17px; }
  </style>
</head>
<body>

<header>
  <span class="logo">ZakoAI</span>
  <div class="status"><div class="dot"></div>Faol</div>
</header>

<div id="chat">
  <div id="welcome">
    <div class="welcome-icon">✦</div>
    <h1>Salom! Men ZakoAI</h1>
    <p>Har qanday savolingizga javob beraman. Nima haqida suhbatlashmoqchisiz?</p>
    <div class="suggestions">
      <button class="suggestion">🚀 Kelajak texnologiyalari</button>
      <button class="suggestion">📝 Menga she'r yoz</button>
      <button class="suggestion">💡 Biznes g'oyasi ber</button>
      <button class="suggestion">🧠 Matematik masala</button>
    </div>
  </div>
</div>

<footer>
  <div class="input-row">
    <textarea id="userInput" rows="1" placeholder="Xabar yozing…"></textarea>
    <button id="sendBtn" title="Yuborish" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</footer>

<script>
  const chat      = document.getElementById('chat');
  const welcome   = document.getElementById('welcome');
  const input     = document.getElementById('userInput');
  const sendBtn   = document.getElementById('sendBtn');
  const HISTORY   = [];

  // auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    sendBtn.disabled = !input.value.trim();
  });

  // Enter to send (Shift+Enter = newline)
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  sendBtn.addEventListener('click', send);

  // suggestion chips
  document.querySelectorAll('.suggestion').forEach(btn => {
    btn.addEventListener('click', () => {
      input.value = btn.textContent.replace(/^.\s/, '').trim();
      input.dispatchEvent(new Event('input'));
      send();
    });
  });

  function addMessage(role, content) {
    if (welcome) welcome.remove();
    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'ai' ? '✦' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (content === '__typing__') {
      bubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
    } else {
      bubble.innerHTML = content.replace(/\n/g, '<br>');
    }

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage('user', text);
    HISTORY.push({ role: 'user', content: text });

    const typingBubble = addMessage('ai', '__typing__');

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: "Sen ZakoAI deb ataladigan aqlli, do'stona va zamonaviy AI yordamchisisan. Asosan o'zbek tilida muloqot qilasan, lekin foydalanuvchi boshqa tilda yozsa, shu tilda javob berasan. Qisqa, aniq va yordam beruvchi javoblar ber.",
          messages: HISTORY
        })
      });

      const data = await res.json();
      const reply = data.content?.map(b => b.text || '').join('') || 'Xatolik yuz berdi.';
      HISTORY.push({ role: 'assistant', content: reply });
      typingBubble.innerHTML = reply.replace(/\n/g, '<br>');
    } catch {
      typingBubble.innerHTML = '⚠️ Xatolik yuz berdi. Qayta urinib ko'ring.';
    }

    chat.scrollTop = chat.scrollHeight;
  }
</script>
</body>
</html>
